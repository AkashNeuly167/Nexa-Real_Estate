<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" ry="20" fill="#334155"/>
  
  <!-- House shape -->
  <!-- Roof -->
  <polygon points="50,12 88,45 12,45" fill="#f8fafc"/>
  <!-- House body -->
  <rect x="20" y="45" width="60" height="43" fill="#f8fafc"/>
  <!-- Door -->
  <rect x="38" y="62" width="24" height="26" rx="3" fill="#334155"/>

  <!-- N letter overlaid on door area -->
  <text x="50" y="84" 
    font-family="Arial Black, sans-serif" 
    font-size="22" 
    font-weight="900"
    fill="#94a3b8"
    text-anchor="middle">N</text>

  <!-- Chimney -->
  <rect x="65" y="28" width="10" height="18" rx="2" fill="#f8fafc"/>
</svg>
